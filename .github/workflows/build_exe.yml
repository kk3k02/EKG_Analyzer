name: Build Windows EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install torch>=2.2 torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller
          pip install -r requirements-exe.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SIiCA_program `
            --add-data "app/models/ml;app/models/ml" `
            app/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EKG_Analyzer_windows
          path: dist/SIiCA_program.exe